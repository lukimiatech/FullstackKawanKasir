spring.application.name=kawan-kasir-api
server.port=${PORT:8080}

# Default development profile uses H2 so the API can run immediately.
# Set DB_URL/DB_USERNAME/DB_PASSWORD to use local MySQL, for example:
# jdbc:mysql://localhost:3306/kawan_kasir?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Jakarta
spring.datasource.url=${DB_URL:jdbc:h2:mem:kawan_kasir;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:none}
spring.jpa.open-in-view=false
spring.flyway.enabled=${FLYWAY_ENABLED:false}

app.jwt.secret=${JWT_SECRET:dev-only-change-this-kawan-kasir-secret-minimum-32-chars}
app.jwt.access-token-minutes=${JWT_ACCESS_MINUTES:120}
app.jwt.refresh-token-days=${JWT_REFRESH_DAYS:14}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
